<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Quilo 근거 기반 생성 파이프라인</title><desc id="desc">업로드 원본에서 구조화, AI 생성, 검증, 문서화로 이어지는 흐름</desc>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f4f8ff"/><stop offset="1" stop-color="#edf8f5"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#213a60" flood-opacity=".13"/></filter></defs>
  <rect width="1440" height="760" rx="34" fill="url(#g)"/>
  <g font-family="Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif">
    <text x="84" y="100" fill="#125fd9" font-size="20" font-weight="800" letter-spacing="2">GROUNDING PIPELINE</text>
    <text x="84" y="158" fill="#0a1930" font-size="46" font-weight="850" letter-spacing="-2">AI가 쓰되, 원본과 코드는 끝까지 확인합니다</text>
    <text x="84" y="201" fill="#61718a" font-size="21">Quilo의 보고서 생성은 하나의 모델 호출이 아니라 네 개의 책임 구간으로 나뉩니다.</text>
    <g filter="url(#s)">
      <g transform="translate(82 286)"><rect width="270" height="300" rx="24" fill="#fff"/><rect x="24" y="24" width="55" height="55" rx="16" fill="#eaf2ff"/><text x="42" y="61" fill="#1763e8" font-size="24" font-weight="850">1</text><text x="24" y="118" fill="#0b1930" font-size="25" font-weight="850">입력 구조화</text><text x="24" y="159" fill="#627189" font-size="17">PDF · CAP · XLSX · 사진을</text><text x="24" y="187" fill="#627189" font-size="17">서버에서 먼저 읽고 구분합니다.</text><path d="M24 226h222" stroke="#dce5f1"/><text x="24" y="263" fill="#1763e8" font-size="16" font-weight="750">사람이 정리한 데이터 우선</text></g>
      <g transform="translate(418 286)"><rect width="270" height="300" rx="24" fill="#fff"/><rect x="24" y="24" width="55" height="55" rx="16" fill="#edf2ff"/><text x="42" y="61" fill="#315ee8" font-size="24" font-weight="850">2</text><text x="24" y="118" fill="#0b1930" font-size="25" font-weight="850">근거 기반 생성</text><text x="24" y="159" fill="#627189" font-size="17">자료·학교 양식·작성 기준을</text><text x="24" y="187" fill="#627189" font-size="17">같은 생성 계약에 묶습니다.</text><path d="M24 226h222" stroke="#dce5f1"/><text x="24" y="263" fill="#315ee8" font-size="16" font-weight="750">구조화된 JSON 계약</text></g>
      <g transform="translate(754 286)"><rect width="270" height="300" rx="24" fill="#fff"/><rect x="24" y="24" width="55" height="55" rx="16" fill="#e9f7f4"/><text x="42" y="61" fill="#13856d" font-size="24" font-weight="850">3</text><text x="24" y="118" fill="#0b1930" font-size="25" font-weight="850">코드 검증</text><text x="24" y="159" fill="#627189" font-size="17">숫자·JSON·수식·첨부 형식을</text><text x="24" y="187" fill="#627189" font-size="17">결정적 로직으로 재검사합니다.</text><path d="M24 226h222" stroke="#dce5f1"/><text x="24" y="263" fill="#13856d" font-size="16" font-weight="750">충돌만 원본으로 복원</text></g>
      <g transform="translate(1090 286)"><rect width="270" height="300" rx="24" fill="#fff"/><rect x="24" y="24" width="55" height="55" rx="16" fill="#e9f7f4"/><text x="42" y="61" fill="#13856d" font-size="24" font-weight="850">4</text><text x="24" y="118" fill="#0b1930" font-size="25" font-weight="850">문서 완성</text><text x="24" y="159" fill="#627189" font-size="17">DOCX · HWPX · PDF를 실제</text><text x="24" y="187" fill="#627189" font-size="17">편집 가능한 객체로 만듭니다.</text><path d="M24 226h222" stroke="#dce5f1"/><text x="24" y="263" fill="#13856d" font-size="16" font-weight="750">열림·렌더·파일명 검사</text></g>
    </g>
    <g fill="none" stroke="#7b99c5" stroke-width="3"><path d="M360 436h48"/><path d="m396 426 12 10-12 10"/><path d="M696 436h48"/><path d="m732 426 12 10-12 10"/><path d="M1032 436h48"/><path d="m1068 426 12 10-12 10"/></g>
    <text x="720" y="681" text-anchor="middle" fill="#53657d" font-size="18">빠른 자동화보다, 제출 가능한 결과와 설명 가능한 판단을 우선합니다.</text>
  </g>
</svg>
