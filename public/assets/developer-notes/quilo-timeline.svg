<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Quilo 개발 연대기</title>
  <desc id="desc">2026년 4월 보고서 생성기에서 7월 학업 AI 워크스페이스까지의 발전 과정</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071120"/><stop offset="1" stop-color="#10294f"/></linearGradient>
    <linearGradient id="line" x1="0" x2="1"><stop stop-color="#67a4ff"/><stop offset="1" stop-color="#6de2c0"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#00102c" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1440" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1255" cy="90" r="185" fill="#175ee8" opacity=".13"/><circle cx="120" cy="705" r="230" fill="#2bc9a3" opacity=".08"/>
  <g font-family="Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif">
    <text x="92" y="102" fill="#77aaff" font-size="22" font-weight="750" letter-spacing="2">QUILO · DEVELOPMENT HISTORY</text>
    <text x="92" y="162" fill="#fff" font-size="48" font-weight="850" letter-spacing="-2">보고서 하나에서, 학업 전체를 잇는 워크스페이스로</text>
    <text x="92" y="205" fill="#b6c5dc" font-size="22">실제 제품 커밋과 운영 기록을 기준으로 정리한 2026년 4월–7월의 변화</text>
    <path d="M130 370 H1310" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>
    <g filter="url(#shadow)">
      <g transform="translate(105 292)"><rect width="250" height="205" rx="20" fill="#fff"/><circle cx="31" cy="78" r="13" fill="#1f67ee"/><text x="22" y="36" fill="#1f67ee" font-size="17" font-weight="800">04.25</text><text x="22" y="119" fill="#0b172b" font-size="25" font-weight="820">첫 보고서 생성기</text><text x="22" y="152" fill="#607086" font-size="17">화학 사전보고서 · 계정</text><text x="22" y="178" fill="#607086" font-size="17">진행 스트림 · 비용 안전망</text></g>
      <g transform="translate(430 292)"><rect width="250" height="205" rx="20" fill="#fff"/><circle cx="31" cy="78" r="13" fill="#367af2"/><text x="22" y="36" fill="#367af2" font-size="17" font-weight="800">05</text><text x="22" y="119" fill="#0b172b" font-size="25" font-weight="820">문서 엔진 완성</text><text x="22" y="152" fill="#607086" font-size="17">HWPX · 수식 · Capstone</text><text x="22" y="178" fill="#607086" font-size="17">원본 데이터 보정 · 파일함</text></g>
      <g transform="translate(755 292)"><rect width="250" height="205" rx="20" fill="#fff"/><circle cx="31" cy="78" r="13" fill="#42a8d8"/><text x="22" y="36" fill="#2589ba" font-size="17" font-weight="800">06</text><text x="22" y="119" fill="#0b172b" font-size="25" font-weight="820">학습 도구 확장</text><text x="22" y="152" fill="#607086" font-size="17">문제집 · 수행평가 · 번역</text><text x="22" y="178" fill="#607086" font-size="17">창작 · 공개 API 기반</text></g>
      <g transform="translate(1080 292)"><rect width="250" height="205" rx="20" fill="#fff"/><circle cx="31" cy="78" r="13" fill="#38c6a4"/><text x="22" y="36" fill="#168a71" font-size="17" font-weight="800">07</text><text x="22" y="119" fill="#0b172b" font-size="25" font-weight="820">Quilo Workspace</text><text x="22" y="152" fill="#607086" font-size="17">통합 셸 · 직원 역할 · API</text><text x="22" y="178" fill="#607086" font-size="17">개발 노트 · 자료실 · 지원</text></g>
    </g>
    <rect x="92" y="580" width="1256" height="92" rx="18" fill="#ffffff" opacity=".07" stroke="#8aa7cc" stroke-opacity=".28"/>
    <text x="126" y="624" fill="#fff" font-size="19" font-weight="750">한 번도 바뀌지 않은 기준</text>
    <text x="126" y="654" fill="#b9c8dd" font-size="18">학생이 올린 원본을 지키고 · 긴 작업은 복구 가능하게 만들고 · 제출 가능한 문서로 끝낸다</text>
  </g>
</svg>
