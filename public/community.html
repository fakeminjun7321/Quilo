<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="canonical" href="https://quilolab.com/community.html" />
    <meta name="description" content="Quilo 커뮤니티 — 질문을 나누고, 사용 팁과 작업 결과를 함께 공유하는 사용자 게시판입니다." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>커뮤니티 — Quilo</title>
    <script>
      try {
        var t = localStorage.getItem("theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/ui/foundation.css" />
    <link rel="stylesheet" href="/ui/shell.css" />
    <link rel="stylesheet" href="/ui/pages.css" />
    <link rel="stylesheet" href="/ui/support.css" />
  </head>
  <body class="q-shell-page ui-page community-page" data-community-page>
    <a class="ui-skip-link" href="#main-content">본문으로 건너뛰기</a>
    <header class="ui-site-header" data-ui-shell></header>

    <main id="main-content" class="community-main">
      <section class="community-hero" aria-labelledby="community-title">
        <div class="community-hero__copy">
          <h1 id="community-title">커뮤니티</h1>
          <p>질문을 나누고, 사용 경험과 작업 결과를 함께 공유하세요.</p>
          <button id="communityComposeToggle" class="community-primary-action" type="button" hidden>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"></path></svg>
            글쓰기
          </button>
          <a id="communityLoginLink" class="community-primary-action" href="/login.html?next=%2Fcommunity.html" hidden>로그인하고 글쓰기</a>
        </div>
        <aside class="community-developer-note" aria-label="개발 노트 안내">
          <span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M8 3h8l4 4v14H4V3Z"></path><path d="M16 3v5h5M9 12l-2 2 2 2m6-4 2 2-2 2m-2-6-2 8"></path></svg></span>
          <div><p>기술 구현 기록은 개발 노트에서 확인하세요.</p><a href="/developer-notes.html">개발 노트 보기 <span aria-hidden="true">→</span></a></div>
        </aside>
      </section>

      <section class="community-workspace" aria-label="커뮤니티 게시판">
        <div class="community-board-column">
          <div class="community-toolbar">
            <div class="community-categories" role="group" aria-label="게시글 분류">
              <button type="button" data-community-category="" aria-pressed="true">전체</button>
              <button type="button" data-community-category="general" aria-pressed="false">자유</button>
              <button type="button" data-community-category="question" aria-pressed="false">질문</button>
              <button type="button" data-community-category="tip" aria-pressed="false">사용팁</button>
              <button type="button" data-community-category="showcase" aria-pressed="false">작업공유</button>
            </div>
            <label class="community-search" for="communitySearch">
              <span class="ui-sr-only">커뮤니티 게시글 검색</span>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m16 16 5 5"></path></svg>
              <input id="communitySearch" type="search" autocomplete="off" placeholder="제목과 내용을 검색하세요" />
            </label>
          </div>

          <div class="community-board" aria-live="polite">
            <div class="community-board-head" aria-hidden="true">
              <span>분류</span><span>제목</span><span>작성자</span><span>공감</span><span>댓글</span><span>작성일</span><span></span>
            </div>
            <div id="communityPostList" class="community-post-list" aria-busy="true">
              <div class="community-empty"><span class="support-spinner" aria-hidden="true"></span><strong>게시글을 불러오고 있습니다.</strong></div>
            </div>
          </div>
          <p id="communityListStatus" class="community-list-status" role="status" aria-live="polite"></p>
        </div>

        <aside id="communityWritePanel" class="community-write-panel" hidden aria-labelledby="community-write-title">
          <div class="community-write-panel__head">
            <div><h2 id="community-write-title">새 글 작성</h2><p>Quilo 사용자와 나누고 싶은 내용을 적어 주세요.</p></div>
            <button id="communityComposeClose" type="button" aria-label="글쓰기 닫기"><svg viewBox="0 0 24 24" fill="none"><path d="m6 6 12 12M18 6 6 18"></path></svg></button>
          </div>
          <form id="communityPostForm" class="community-write-form" novalidate>
            <label for="communityNewCategory"><span>분류</span>
              <select id="communityNewCategory" required>
                <option value="">분류를 선택하세요</option>
                <option value="general">자유</option>
                <option value="question">질문</option>
                <option value="tip">사용팁</option>
                <option value="showcase">작업공유</option>
              </select>
            </label>
            <label for="communityNewTitle"><span>제목</span><input id="communityNewTitle" type="text" maxlength="200" autocomplete="off" placeholder="제목을 입력하세요" required /></label>
            <label for="communityNewBody"><span>내용</span><textarea id="communityNewBody" maxlength="5000" rows="10" placeholder="질문이나 경험을 구체적으로 적어 주세요." required></textarea></label>
            <p>비밀번호, API 키, 다른 사람의 개인정보는 게시하지 마세요.</p>
            <button id="communityPostSubmit" type="submit">등록</button>
            <p id="communityPostStatus" class="community-form-status" role="status" aria-live="polite"></p>
          </form>
        </aside>
      </section>
    </main>

    <footer class="ui-site-footer"></footer>
    <script src="/ui/shell.js"></script>
    <script src="/ui/support.js"></script>
  </body>
</html>
