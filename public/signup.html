<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#243ba2" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원가입 — Quilo</title>
    <meta name="description" content="Quilo 계정을 만들어 화학·물리 보고서 초안 생성을 시작하세요." />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="landing">
    <div class="landing-bg" aria-hidden="true"></div>

    <nav class="landing-nav">
      <div class="landing-nav-inner">
        <a href="/" class="brand">
          <span class="brand-mark" aria-hidden="true">Q</span>
          Quilo
        </a>
        <div class="landing-nav-actions">
          <a href="/login.html" class="nav-link">로그인</a>
          <button type="button" id="themeToggle" class="theme-toggle" aria-label="다크 모드로 전환" title="다크 모드로 전환">
            <span class="theme-icon-light" aria-hidden="true">🌙</span>
            <span class="theme-icon-dark" aria-hidden="true">☀️</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="landing-shell">
      <section class="section" style="border-top:0;display:flex;justify-content:center">
        <div class="login-card" style="width:100%;max-width:460px">
          <form id="form">
            <div class="auth-head">
              <h1>회원가입</h1>
              <p class="hint">계정을 만들어 시작하세요. 보고서 생성에 필요한 크레딧은 가입 후 운영자가 충전합니다.</p>
            </div>
            <div class="field">
              <label>
                <span class="field-label">이름 (로그인 아이디)</span>
                <input id="username" name="username" required minlength="2" maxlength="50" autocomplete="username" />
              </label>
            </div>
            <div class="field">
              <label>
                <span class="field-label">비밀번호 (6자 이상)</span>
                <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password" />
              </label>
            </div>
            <div class="field">
              <label>
                <span class="field-label">비밀번호 확인</span>
                <input id="password2" name="password2" type="password" required minlength="6" autocomplete="new-password" />
              </label>
            </div>
            <label class="check-line">
              <input type="checkbox" id="age14" required />
              <span>만 14세 이상입니다 <strong>(필수)</strong></span>
            </label>
            <label class="check-line">
              <input type="checkbox" id="agree" required />
              <span>이용약관·개인정보처리방침·환불정책을 이해했고 동의합니다 <strong>(필수)</strong></span>
            </label>
            <p class="hint">
              가입 전
              <a href="/terms.html" target="_blank" rel="noopener">이용약관</a>,
              <a href="/privacy.html" target="_blank" rel="noopener">개인정보처리방침</a>,
              <a href="/refund.html" target="_blank" rel="noopener">환불정책</a>을 확인하세요.
            </p>
            <div class="form-actions">
              <button type="submit" id="btn">회원가입</button>
            </div>
            <p id="err" class="form-error" role="alert"></p>
            <p class="hint" style="text-align:center;margin:0">
              이미 계정이 있으신가요? <a href="/login.html">로그인</a>
            </p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="/terms.html">이용약관</a>
        <a href="/privacy.html">개인정보처리방침</a>
        <a href="/refund.html">환불정책</a>
        <a href="/changelog.html">패치노트</a>
        <a href="/tools/index.html">도구 모음</a>
        <a href="https://blog.naver.com/physicjun1905" target="_blank" rel="noopener">블로그</a>
      </div>
      <div class="footer-copy">© 2026 Quilo · MIT License</div>
    </footer>

    <script>
      const form = document.getElementById("form");
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");

      // 비밀번호 표시(눈) 토글 — 오타 확인용.
      (function () {
        const EYE =
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        const EYEOFF =
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
        function addPwToggle(input) {
          if (!input || input.dataset.pwToggle) return;
          input.dataset.pwToggle = "1";
          const wrap = document.createElement("span");
          wrap.style.cssText = "position:relative;display:block";
          input.parentNode.insertBefore(wrap, input);
          wrap.appendChild(input);
          input.style.paddingRight = "40px";
          const b = document.createElement("button");
          b.type = "button";
          b.tabIndex = -1;
          b.setAttribute("aria-label", "비밀번호 표시");
          b.title = "비밀번호 표시";
          b.style.cssText =
            "position:absolute;top:50%;right:6px;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:none;border:0;cursor:pointer;color:#64748b;padding:0;border-radius:6px";
          b.innerHTML = EYE;
          b.addEventListener("click", () => {
            const show = input.type === "password";
            input.type = show ? "text" : "password";
            b.innerHTML = show ? EYEOFF : EYE;
            const lab = show ? "비밀번호 숨기기" : "비밀번호 표시";
            b.setAttribute("aria-label", lab);
            b.title = lab;
          });
          wrap.appendChild(b);
        }
        ["password", "password2"].forEach((id) =>
          addPwToggle(document.getElementById(id)),
        );
      })();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const pw = document.getElementById("password").value;
        const pw2 = document.getElementById("password2").value;
        if (pw.length < 6) {
          err.textContent = "비밀번호는 6자 이상이어야 합니다.";
          return;
        }
        if (pw !== pw2) {
          err.textContent = "비밀번호가 일치하지 않습니다.";
          return;
        }
        if (!document.getElementById("age14").checked) {
          err.textContent = "만 14세 이상인 경우에만 가입할 수 있습니다.";
          return;
        }
        if (!document.getElementById("agree").checked) {
          err.textContent = "약관과 고지 사항에 동의해야 가입할 수 있습니다.";
          return;
        }
        err.textContent = "";
        btn.disabled = true;
        btn.textContent = "가입 중...";
        try {
          const res = await fetch("/api/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("username").value,
              password: pw,
              age14Confirmed: document.getElementById("age14").checked,
              termsAccepted: document.getElementById("agree").checked,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "회원가입 실패");
          location.href = "/";
        } catch (e) {
          err.textContent = e.message;
          btn.disabled = false;
          btn.textContent = "회원가입";
        }
      });
    </script>
    <script src="/theme.js"></script>
      <script src="/chat-widget.js" defer></script>
</body>
</html>
