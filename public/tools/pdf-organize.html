    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF 페이지 정렬 — 보고서 도구</title>
    <meta name="description" content="PDF 페이지 순서를 바꾸거나 삭제하는 브라우저 도구. 업로드 없이 기기 안에서 처리." />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
          if (new URLSearchParams(location.search).has("embed"))
            document.documentElement.classList.add("embed");
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" href="/ui/foundation.css" />
    <link rel="stylesheet" href="/ui/shell.css" />
    <link rel="stylesheet" href="/ui/pages.css" />

  <body class="landing q-shell-page ui-page">
    <div class="landing-bg" aria-hidden="true"></div>
    <a class="ui-skip-link" href="#main-content">본문으로 건너뛰기</a>
    <header class="ui-site-header" data-ui-shell></header>

    <main class="landing-shell" id="main-content">
      <section class="section ui-inline-tools-pdf-organize-1">
        <div class="tool-page-head">
          <h1>PDF 페이지 정렬</h1>
          <p>페이지 순서 변경·삭제. 모든 처리는 브라우저 안에서만 이뤄지고 파일은 서버로 전송되지 않습니다.</p>
        </div>

        <div class="tool-card">
          <div id="poDrop" role="button" tabindex="0" class="ui-inline-tools-pdf-organize-2" >
            <div class="ui-inline-tools-pdf-organize-3" >PDF 파일을 끌어다 놓기</div>
            <div class="ui-inline-tools-pdf-organize-4" >또는 클릭해서 선택 · 1개</div>
          </div>
          <input type="file" id="poFile" accept="application/pdf,.pdf" class="ui-inline-tools-pdf-organize-5" />

          <div id="poEditor" class="ui-inline-tools-pdf-organize-6" >
            <p class="hint ui-inline-tools-pdf-organize-7">썸네일을 끌어서 순서를 바꾸세요. 빨간 표시된 페이지는 삭제됩니다.</p>

            <div class="ui-inline-tools-pdf-organize-8" >
              <label class="tool-label" for="poOrder">새 순서 직접 입력 <span class="ui-inline-tools-pdf-organize-9" >(원래 페이지 번호를 콤마로, 예: 3,1,2,5)</span></label>
              <div class="ui-inline-tools-pdf-organize-10" >
                <input type="text" id="poOrder" class="tool-input ui-inline-tools-pdf-organize-11" inputmode="numeric" placeholder="비워 두면 아래 썸네일 순서를 사용" />
                <button class="btn-ghost" id="poApply" type="button">순서 적용</button>
                <button class="btn-ghost" id="poReset" type="button">처음으로</button>
              </div>
              <p class="hint ui-inline-tools-pdf-organize-12" id="poOrderMsg" role="status" aria-live="polite" aria-atomic="true"></p>
            </div>

            <ul id="poGrid"></ul>

            <div class="actions">
              <button class="btn-primary" id="poBuild">정렬된 PDF 만들기</button>
              <button class="btn-ghost" id="poClear" type="button">비우기</button>
            </div>
          </div>

          <div id="poOut" class="tool-result ui-inline-tools-pdf-organize-13">
            <div class="badge ok ui-inline-tools-pdf-organize-14" id="poStat" role="status" aria-live="polite" aria-atomic="true"></div>
            <a id="poDl" class="btn-lg btn-primary ui-inline-tools-pdf-organize-15" download>↓ 정렬된 PDF 내려받기</a>
          </div>
          <p class="hint ui-inline-tools-pdf-organize-16" id="poMsg" role="status" aria-live="polite" aria-atomic="true"></p>
        </div>
      </section>
    </main>

      <div class="ui-site-footer__inner">
        <nav class="ui-site-footer__links" aria-label="푸터 메뉴"><a href="/terms.html">이용약관</a><a href="/privacy.html">개인정보처리방침</a><a href="/refund.html">환불정책</a><a href="/guide.html">이용 가이드</a><a href="/community.html">커뮤니티</a><a href="https://github.com/fakeminjun7321/Quilo" target="_blank" rel="noopener">GitHub</a></nav>

      </div>

    <script src="/ui/shell.js"></script>
    <script src="/ui/tool-shell.js"></script>
    <script>
      (function () {
        var drop = document.getElementById("poDrop"),
          input = document.getElementById("poFile"),
          editor = document.getElementById("poEditor"),
          grid = document.getElementById("poGrid"),
          orderInput = document.getElementById("poOrder"),
          orderMsg = document.getElementById("poOrderMsg"),
          out = document.getElementById("poOut"),
          msg = document.getElementById("poMsg");
        var applyBtn = document.getElementById("poApply"),
          resetBtn = document.getElementById("poReset"),
          buildBtn = document.getElementById("poBuild"),
          clearBtn = document.getElementById("poClear");

        var fileBytes = null,
          fileName = "",
          numPages = 0,
          lastUrl = null;
        // items: each { orig: 0-based original index, del: bool }. Array order = output order.
        var items = [];

        function esc(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }
        function reset() {
          fileBytes = null; fileName = ""; numPages = 0; items = [];
          editor.style.display = "none"; out.style.display = "none";
          grid.innerHTML = ""; orderInput.value = ""; orderMsg.textContent = ""; msg.textContent = "";
        }

        // ── load + render thumbnails ──
        function load(f) {
          reset();
          if (!f || !(/\.pdf$/i.test(f.name) || f.type === "application/pdf")) {
            msg.innerHTML = '<span class="error">PDF 파일만 올릴 수 있습니다.</span>';
            return;
          }
          if (!window.pdfjsLib) {
            msg.textContent = "PDF 미리보기 엔진을 불러오는 중…";
            window.QuiloToolAssets.load("pdfJs").then(function () { load(f); }).catch(function (e) {
              msg.innerHTML = '<span class="error">' + esc(e.message || "PDF 미리보기 엔진을 불러오지 못했습니다.") + "</span>";
            });
            return;
          }
          fileName = f.name; msg.textContent = "PDF를 읽는 중…";
          (async function () {
            try {
              pdfjsLib.GlobalWorkerOptions.workerSrc = "/tools/vendor/pdf.worker.min.js";
              fileBytes = new Uint8Array(await f.arrayBuffer());
              // pdf.js transfers/detaches the buffer it receives, so hand it a copy and keep ours for pdf-lib.
              var pdf = await pdfjsLib.getDocument({ data: fileBytes.slice() }).promise;
              numPages = pdf.numPages;
              items = [];
              for (var i = 0; i < numPages; i++) items.push({ orig: i, del: false });
              renderGrid();
              editor.style.display = "block";
              msg.textContent = "";
              // render canvases progressively (non-blocking)
              for (var p = 1; p <= numPages; p++) {
                try {
                  var page = await pdf.getPage(p);
                  var vp0 = page.getViewport({ scale: 1 });
                  var scale = Math.min(0.5, 220 / Math.max(1, vp0.width));
                  var vp = page.getViewport({ scale: scale });
                  var cv = grid.querySelector('canvas[data-orig="' + (p - 1) + '"]');
                  if (!cv) continue;
                  cv.width = Math.max(1, Math.floor(vp.width));
                  cv.height = Math.max(1, Math.floor(vp.height));
                  await page.render({ canvasContext: cv.getContext("2d"), viewport: vp }).promise;
                } catch (e2) { /* skip a bad page render, keep going */ }
              }
            } catch (e) {
              reset();
              msg.innerHTML = '<span class="error">PDF를 열지 못했습니다: ' + esc(e.message || "알 수 없는 오류") + " (암호가 걸린 PDF는 처리할 수 없습니다)</span>";
            }
          })();
        }

        // ── grid render (order = items[]) ──
        function renderGrid() {
          grid.innerHTML = items.map(function (it, i) {
            return '<li class="po-item' + (it.del ? " del" : "") + '" draggable="true" data-i="' + i + '">' +
              (it.del ? '<span class="po-delbadge">삭제</span>' : '') +
              '<div class="po-canvas-wrap"><canvas data-orig="' + it.orig + '"></canvas></div>' +
              '<div class="po-foot">' +
                '<span class="po-pos">' + (i + 1) + '</span>' +
                '<span class="po-orig">원본 ' + (it.orig + 1) + '쪽</span>' +
                '<button type="button" class="btn-ghost po-delbtn" data-del="' + i + '">' + (it.del ? "복구" : "삭제") + '</button>' +
              '</div></li>';
          }).join("");
          wireItems();
          syncCount();
        }
        // Re-render only the foot labels + classes without throwing away rendered canvases.
        function refreshLabels() {
          var lis = grid.querySelectorAll(".po-item");
          for (var i = 0; i < lis.length; i++) {
            var it = items[i]; var li = lis[i];
            li.setAttribute("data-i", i);
            li.classList.toggle("del", it.del);
            var badge = li.querySelector(".po-delbadge");
            if (it.del && !badge) { badge = document.createElement("span"); badge.className = "po-delbadge"; badge.textContent = "삭제"; li.insertBefore(badge, li.firstChild); }
            else if (!it.del && badge) { badge.remove(); }
            li.querySelector(".po-pos").textContent = i + 1;
            li.querySelector(".po-orig").textContent = "원본 " + (it.orig + 1) + "쪽";
            var db = li.querySelector("[data-del]"); db.setAttribute("data-del", i); db.textContent = it.del ? "복구" : "삭제";
          }
          syncCount();
        }
        function syncCount() {
          var keep = items.filter(function (x) { return !x.del; }).length;
          buildBtn.disabled = keep === 0;
          buildBtn.textContent = "정렬된 PDF 만들기" + (keep ? " (" + keep + "쪽)" : "");
        }

        var dragIdx = null;
        function wireItems() {
          var lis = grid.querySelectorAll(".po-item");
          lis.forEach(function (li) {
            li.addEventListener("dragstart", function (e) {
              dragIdx = +li.getAttribute("data-i");
              li.classList.add("dragging");
              if (e.dataTransfer) { e.dataTransfer.effectAllowed = "move"; try { e.dataTransfer.setData("text/plain", String(dragIdx)); } catch (x) {} }
            });
            li.addEventListener("dragend", function () { dragIdx = null; li.classList.remove("dragging"); lis.forEach(function (x) { x.classList.remove("over"); }); });
            li.addEventListener("dragover", function (e) { e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = "move"; li.classList.add("over"); });
            li.addEventListener("dragleave", function () { li.classList.remove("over"); });
            li.addEventListener("drop", function (e) {
              e.preventDefault(); li.classList.remove("over");
              var to = +li.getAttribute("data-i");
              if (dragIdx === null || dragIdx === to || isNaN(to)) return;
              var moved = items.splice(dragIdx, 1)[0];
              items.splice(to, 0, moved);
              orderInput.value = ""; orderMsg.textContent = ""; out.style.display = "none";
              renderGrid(); // full re-render so canvases follow their items
            });
          });
          grid.querySelectorAll("[data-del]").forEach(function (b) {
            b.addEventListener("click", function () {
              var i = +b.getAttribute("data-del");
              items[i].del = !items[i].del;
              out.style.display = "none";
              refreshLabels();
            });
          });
        }

        // ── apply text order string ──
        function applyOrder() {
          var raw = orderInput.value.trim();
          orderMsg.textContent = "";
          if (!raw) { orderMsg.textContent = "입력이 비어 있어 현재 썸네일 순서를 그대로 둡니다."; return; }
          var parts = raw.split(/[\s,]+/).filter(Boolean);
          var nums = [], seen = {}, bad = false;
          for (var i = 0; i < parts.length; i++) {
            var n = parseInt(parts[i], 10);
            if (isNaN(n) || n < 1 || n > numPages) { bad = true; break; }
            if (seen[n]) { bad = true; break; }
            seen[n] = 1; nums.push(n);
          }
          if (bad) {
            orderMsg.innerHTML = '<span class="error">1부터 ' + numPages + '까지의 원본 페이지 번호를 중복 없이 입력하세요.</span>';
            return;
          }
          // Build new items: listed pages (kept), then any omitted pages marked as deleted.
          var newItems = nums.map(function (n) { return { orig: n - 1, del: false }; });
          for (var k = 1; k <= numPages; k++) { if (!seen[k]) newItems.push({ orig: k - 1, del: true }); }
          items = newItems;
          out.style.display = "none";
          renderGrid();
          renderMissingCanvases(); // input-driven order doesn't re-rasterize, so paint any blank canvases
          var omitted = numPages - nums.length;
          orderMsg.textContent = "순서를 적용했습니다." + (omitted > 0 ? " 빠진 " + omitted + "쪽은 삭제 표시했습니다." : "");
        }

        // After a full renderGrid that wasn't triggered by a fresh load, the new <canvas> elements are blank.
        // Re-rasterize them from the stored bytes so thumbnails always reflect the current layout.
        function renderMissingCanvases() {
          if (!fileBytes || !window.pdfjsLib) return;
          (async function () {
            try {
              var pdf = await pdfjsLib.getDocument({ data: fileBytes.slice() }).promise;
              var canvases = grid.querySelectorAll("canvas");
              for (var i = 0; i < canvases.length; i++) {
                var cv = canvases[i];
                if (cv.width > 1 && cv.dataset.rendered === "1") continue;
                var orig = +cv.getAttribute("data-orig");
                var page = await pdf.getPage(orig + 1);
                var vp0 = page.getViewport({ scale: 1 });
                var scale = Math.min(0.5, 220 / Math.max(1, vp0.width));
                var vp = page.getViewport({ scale: scale });
                cv.width = Math.max(1, Math.floor(vp.width));
                cv.height = Math.max(1, Math.floor(vp.height));
                await page.render({ canvasContext: cv.getContext("2d"), viewport: vp }).promise;
                cv.dataset.rendered = "1";
              }
            } catch (e) { /* thumbnails are cosmetic; ignore */ }
          })();
        }

        // ── build output with pdf-lib ──
        buildBtn.addEventListener("click", function () {
          var keep = items.filter(function (x) { return !x.del; });
          if (!fileBytes || keep.length === 0) return;
          if (!window.PDFLib) { msg.innerHTML = '<span class="error">PDF 라이브러리를 불러오지 못했습니다.</span>'; return; }
          buildBtn.disabled = true; var label = buildBtn.textContent; buildBtn.textContent = "만드는 중…"; msg.textContent = ""; out.style.display = "none";
          (async function () {
            try {
              var PDFDocument = PDFLib.PDFDocument;
              var src = await PDFDocument.load(fileBytes, { ignoreEncryption: true });
              var outDoc = await PDFDocument.create();
              var indices = keep.map(function (x) { return x.orig; });
              var copied = await outDoc.copyPages(src, indices);
              copied.forEach(function (pg) { outDoc.addPage(pg); });
              var bytes = await outDoc.save();
              if (lastUrl) URL.revokeObjectURL(lastUrl);
              lastUrl = URL.createObjectURL(new Blob([bytes], { type: "application/pdf" }));
              var removed = numPages - keep.length;
              document.getElementById("poStat").textContent = "✓ " + keep.length + "쪽 정렬 완료" + (removed > 0 ? " · " + removed + "쪽 삭제" : "");
              var dl = document.getElementById("poDl");
              dl.href = lastUrl;
              dl.download = fileName.replace(/\.pdf$/i, "") + "_정렬.pdf";
              out.style.display = "grid";
            } catch (e) {
              msg.innerHTML = '<span class="error">생성 실패: ' + esc(e.message || "알 수 없는 오류") + "</span>";
            } finally {
              buildBtn.disabled = false; buildBtn.textContent = label; syncCount();
            }
          })();
        });

        // ── wiring ──
        drop.addEventListener("click", function () { input.click(); });
        drop.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); input.click(); } });
        input.addEventListener("change", function () { if (input.files && input.files[0]) load(input.files[0]); input.value = ""; });
        ["dragover", "dragenter"].forEach(function (ev) { drop.addEventListener(ev, function (e) { e.preventDefault(); drop.style.borderColor = "var(--accent)"; }); });
        ["dragleave", "drop"].forEach(function (ev) { drop.addEventListener(ev, function (e) { e.preventDefault(); drop.style.borderColor = "var(--border-strong)"; }); });
        drop.addEventListener("drop", function (e) { if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) load(e.dataTransfer.files[0]); });

        applyBtn.addEventListener("click", applyOrder);
        orderInput.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); applyOrder(); } });
        resetBtn.addEventListener("click", function () {
          if (!numPages) return;
          items = [];
          for (var i = 0; i < numPages; i++) items.push({ orig: i, del: false });
          orderInput.value = ""; orderMsg.textContent = ""; out.style.display = "none";
          renderGrid(); renderMissingCanvases();
        });
        clearBtn.addEventListener("click", function () { if (lastUrl) { URL.revokeObjectURL(lastUrl); lastUrl = null; } reset(); });
      })();
    </script>
  </body>
</html>
